    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* الألوان مستوحاة من كود Compose الفعلي */
            --main-bg: #000000;             
            --card-bg: rgba(0, 0, 0, 0.2);   /* تم تغييرها من أبيض لأسود شفاف مثل كودك */
            --border-normal: rgba(255, 255, 255, 0.1); /* Color.White.copy(0.1f) */
            --focus-color: #ffffff;          /* اللون الأبيض للتركيز */
            --text-color: #ffffff;
            --transition-speed: 0.2s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--main-bg);
            /* محاكاة AnimatedGradientBackground بتدرج داكن */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* لمنع التمرير العرضي */
        }

        #page {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            #page { grid-template-columns: repeat(3, 1fr); }
        }

        .channel-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            /* الإطار العادي كما في كودك width = 1.dp */
            border: 1px solid var(--border-normal);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            outline: none;
            padding: 10px;
        }

        /* تأثير التركيز (Focus) مطابقت تماماً للأندرويد */
        .channel-card:hover, .channel-card:focus {
            transform: scale(1.1); /* .scale(1.1f) */
            border: 3px solid var(--focus-color); /* .border(3.dp, Color.White) */
            background-color: rgba(255, 255, 255, 0.05); /* إضاءة خفيفة عند التركيز */
            z-index: 10;
        }

        .channel-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: var(--transition-speed);
        }

        .channel-card p {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            /* خلفية اسم القناة كما في الـ Surface في كودك */
            background: rgba(0, 0, 0, 0.5); 
            font-size: 0.7rem;
            padding: 4px;
            text-align: center;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* أنيميشن الدخول */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .channel-card {
            animation: fadeInScale 0.3s ease-out forwards;
        }
    </style>
</head>

    <script>
        // تحسين التنقل بالريموت (DPAD) ليكون متوافقاً مع شبكة الـ 5 أعمدة
        document.addEventListener('keydown', function(e) {
            const focusable = document.querySelectorAll('.channel-card');
            let index = Array.from(focusable).indexOf(document.activeElement);
            const cols = 5; // عدد الأعمدة

            if (index === -1) { focusable[0].focus(); return; }

            switch(e.key) {
                case "ArrowRight":
                    if (index < focusable.length - 1) focusable[index + 1].focus();
                    break;
                case "ArrowLeft":
                    if (index > 0) focusable[index - 1].focus();
                    break;
                case "ArrowDown":
                    if (index + cols < focusable.length) focusable[index + cols].focus();
                    break;
                case "ArrowUp":
                    if (index - cols >= 0) focusable[index - cols].focus();
                    break;
                case "Enter":
                    document.activeElement.click();
                    break;
            }
        });

        // فوكس تلقائي عند فتح الصفحة
        window.onload = () => {
            if(document.querySelectorAll('.channel-card').length > 0) {
                document.querySelectorAll('.channel-card')[0].focus();
            }
        };
    </script>
