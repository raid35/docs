    <style>
        :root {
            /* الألوان متطابقة مع Compose */
            --main-bg: #000000;             
            --card-bg: rgba(0, 0, 0, 0.2);   /* لون أسود شفاف */
            --border-normal: rgba(255, 255, 255, 0.1); 
            --focus-color: #ffffff;          /* إطار أبيض عند التركيز */
            --text-color: #ffffff;
            --transition-speed: 0.2s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--main-bg);
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden; 
        }

        #page {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تحسين التجاوب للهواتف */
        @media (max-width: 768px) {
            #page { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 480px) {
            #page { grid-template-columns: repeat(2, 1fr); }
        }

        .channel-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-normal);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            outline: none;
            padding: 10px;
        }

        /* تأثير التركيز (Focus/Hover) */
        .channel-card:hover, .channel-card:focus {
            transform: scale(1.1); 
            border: 3px solid var(--focus-color); 
            background-color: rgba(255, 255, 255, 0.05); 
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .channel-card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .channel-card p {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6); 
            font-size: 0.7rem;
            padding: 4px;
            text-align: center;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .channel-card {
            animation: fadeInScale 0.3s ease-out forwards;
        }
    </style>
</head>

    <script>
        // نظام التنقل السلس والمعاد إصلاحه للريموت كنترول
        document.addEventListener('keydown', function(e) {
            const focusable = document.querySelectorAll('.channel-card');
            let index = Array.from(focusable).indexOf(document.activeElement);

            // تحديد أول قناة إذا لم يكن هناك تركيز
            if (index === -1) {
                if (focusable.length > 0) focusable[0].focus();
                return;
            }

            if (e.key === "ArrowRight") {
                if (index < focusable.length - 1) focusable[index + 1].focus();
            } else if (e.key === "ArrowLeft") {
                if (index > 0) focusable[index - 1].focus();
            } else if (e.key === "ArrowDown") {
                // القفز 5 خانات للأسفل (حسب عدد الأعمدة)
                if (index + 5 < focusable.length) focusable[index + 5].focus();
            } else if (e.key === "ArrowUp") {
                // القفز 5 خانات للأعلى
                if (index - 5 >= 0) focusable[index - 5].focus();
            } else if (e.key === "Enter" || e.keyCode === 13) {
                // تنفيذ الضغط عند زر OK
                document.activeElement.click();
            }
        });

        // فوكس تلقائي عند فتح الصفحة لتسهيل استخدام الريموت فوراً
        window.onload = () => {
            const firstCard = document.querySelector('.channel-card');
            if (firstCard) firstCard.focus();
        };
    </script>
