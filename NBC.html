<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siksa Smart Parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .upload-container {
            border: 2px dashed #444;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
        }
        #channelList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .card {
            background: #111;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
        }
        .card:focus { border-color: #fff; outline: none; transform: scale(1.05); }
        .card img { width: 100%; height: 80px; object-fit: contain; }
        input[type="file"] { display: none; }
        .btn-select { background: #fff; color: #000; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>محلل Siksa الذكي</h2>
    
    <div class="upload-container" id="dropZone">
        <p>اختر ملف Canal_SP (1).m3u من جهازك</p>
        <label class="btn-select">
            فتح الملف
            <input type="file" id="fileInput" accept=".m3u,.m3u8">
        </label>
    </div>

    <div id="channelList"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const channelList = document.getElementById('channelList');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const content = event.target.result;
                parseM3U(content);
            };
            reader.readAsText(file);
        });

        function parseM3U(content) {
            channelList.innerHTML = "";
            const lines = content.split('\n');
            let currentName = "قناة غير معروفة";
            let currentLogo = "https://cdn-icons-png.flaticon.com/512/716/716429.png";
            let currentDrm = "";

            lines.forEach(line => {
                line = line.trim();
                
                // استخراج الاسم والشعار
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.*)$/);
                    if (nameMatch) currentName = nameMatch[1];
                    
                    const logoMatch = line.match(/tvg-logo="(.*?)"/);
                    if (logoMatch) currentLogo = logoMatch[1];
                }
                
                // استخراج مفتاح ClearKey (الذكاء البرمجي)
                if (line.includes('license_key=')) {
                    currentDrm = line.split('=')[1].trim();
                }

                // استخراج الرابط وإنشاء الكارد
                if (line.startsWith('http')) {
                    createCard(currentName, currentLogo, line, currentDrm);
                    // تصفير البيانات للقناة التالية
                    currentDrm = ""; 
                }
            });
        }

        function createCard(name, logo, url, drm) {
            const div = document.createElement('div');
            div.className = 'card';
            div.tabIndex = 0;
            div.innerHTML = `
                <img src="${logo}">
                <p style="font-size: 0.8rem;">${name}</p>
            `;

            div.onclick = () => {
                // بناء الـ Intent الذكي بناءً على محتوى الملف
                let intent = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.genuine.leone;component=com.genuine.leone/.player.PlayerActivity`;
                
                if (drm) {
                    intent += `;S.drm_license_key=${drm};S.drm_scheme=clearkey`;
                }
                
                intent += `;end`;
                window.location.href = intent;
            };

            channelList.appendChild(div);
        }
    </script>
</body>
</html>
