<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siksa Smart Parser v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Readex Pro', sans-serif;
            background: #000;
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
        }
        h2 { color: #fff; margin-bottom: 30px; font-weight: 700; }
        .upload-container {
            border: 2px dashed #444;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .upload-container:hover { border-color: #fff; }
        #channelList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 10px;
        }
        .card {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            outline: none;
        }
        /* تحسين التنقل بالريموت كنترول */
        .card:focus, .card:hover { 
            border-color: #fff; 
            transform: scale(1.08); 
            background: #1a1a1a;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .card img { 
            width: 100%; 
            height: 90px; 
            object-fit: contain; 
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .card p {
            margin: 0;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        input[type="file"] { display: none; }
        .btn-select { 
            background: #fff; 
            color: #000; 
            padding: 12px 25px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h2>محلل Siksa الذكي</h2>
    
    <div class="upload-container" id="dropZone">
        <p style="color: #888;">قم برفع ملف M3U الخاص بك لبدء المشاهدة</p>
        <label class="btn-select" tabindex="0">
            فتح ملف القنوات
            <input type="file" id="fileInput" accept=".m3u,.m3u8">
        </label>
    </div>

    <div id="channelList"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const channelList = document.getElementById('channelList');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                parseM3U(event.target.result);
            };
            reader.readAsText(file);
        });

        function parseM3U(content) {
    channelList.innerHTML = "";
    const lines = content.split('\n');
    let currentName = "", currentLogo = "", currentDrm = "", currentUA = "";

    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith('#EXTINF:')) {
            const nameMatch = line.match(/,(.*)$/);
            currentName = nameMatch ? nameMatch[1] : "قناة";
            const logoMatch = line.match(/tvg-logo="(.*?)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
        } 
        // استخراج الـ User-Agent (مهم جداً لقنوات beIN و Shahid)
        else if (line.includes('http-user-agent=')) {
            currentUA = line.split('http-user-agent=')[1].split(' ')[0].trim();
        }
        // استخراج الـ DRM (يدعم الصيغتين)
        else if (line.includes('license_key=') || line.includes('http-drm-license=')) {
            currentDrm = line.split('=')[1].trim();
        }
        else if (line.startsWith('http')) {
            createCard(currentName, currentLogo, line, currentDrm, currentUA);
            currentDrm = ""; currentUA = ""; // تصفير البيانات للقناة التالية
        }
    });
}

function createCard(name, logo, url, drm, ua) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<img src="${logo}"><p>${name}</p>`;

    div.onclick = () => {
        let referer = "https://shahid.mbc.net/";
        let finalUrl = url;
        
        // بناء الرابط المدمج بالبيانات (الذي يفهمه Ettfarej داخلياً)
        if (ua) {
            finalUrl += `|||REF:${referer}|||UA:${ua}`;
        } else {
            finalUrl += `|||REF:${referer}|||UA:Mozilla/5.0 (Windows NT 10.0; Win64; x64)`;
        }

        // بناء Intent بسيط يركز على الحزمة (Package) لفتح المشغل
        // حذفنا الـ component المعقد لضمان عدم حدوث تعارض
        let intent = `intent:${finalUrl}#Intent;` +
                     `action=android.intent.action.VIEW;` +
                     `package=com.tv.ettfarej;` + 
                     `S.url=${encodeURIComponent(url)};` +
                     `S.user_agent=${encodeURIComponent(ua || 'Mozilla/5.0')};`;

        if (drm) {
            intent += `S.drm_key=${drm};S.drm_scheme=clearkey;S.key=${drm};`;
        }

        intent += `end`;

        console.log("Sending Intent: ", intent); // للتأكد في المتصفح
        window.location.href = intent;
    };
    channelList.appendChild(div);
   }
    </script>
</body>
</html>
