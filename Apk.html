<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siksa Pro Player</title>
    
    <meta name="referrer" content="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
    <link rel="stylesheet" href="https://akomov.com/todapi/jw_ako.css">

    <style>
        :root { --primary: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        .header { display: flex; align-items: center; padding: 15px 25px; background: #111; border-bottom: 2px solid #222; }
        .back-btn { background: #ff4b2b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; margin-left: 15px; font-weight: bold; }
        
        #main-content { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; padding: 25px; 
            height: calc(100vh - 100px); overflow-y: auto; 
        }

        .card { 
            background: #1a1a1a; border: 3px solid transparent; border-radius: 12px; 
            padding: 15px; text-align: center; cursor: pointer; transition: 0.25s;
            outline: none;
        }
        /* دعم الريموت (التحديد) */
        .card:focus, .card:hover { border-color: var(--primary); transform: translateY(-5px); background: #222; outline: none; }
        
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #000; border-radius: 8px; }
        .card span { display: block; margin-top: 12px; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #player-wrapper { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; 
        }
        #jwplayerDiv { width: 100% !important; height: 100% !important; }

        .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <button id="btn-back" class="back-btn" onclick="showPackages()">السابق</button>
        <h2 id="title">Siksa TV - الباقات</h2>
    </div>

    <div id="main-content"></div>

    <div id="player-wrapper">
        <div id="loading-spinner" class="loader"></div>
        <div id="jwplayerDiv"></div>
    </div>

    <script>
        const MASTER_URL = 'https://raw.githubusercontent.com/raid35/channel-links/main/siksa_tv.m3u';
        const contentContainer = document.getElementById('main-content');
        const spinner = document.getElementById('loading-spinner');
        let jwInst = null;
        let isInsidePackage = false;

        async function start() {
            try {
                const res = await fetch(MASTER_URL);
                const data = await res.text();
                window.allPackages = parseM3U(data);
                showPackages();
            } catch (e) { alert("خطأ في التحميل"); }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const items = [];
            let current = null;
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    const name = line.split(',').pop();
                    const logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || '';
                    current = { name, logo };
                } else if (line.startsWith('http')) {
                    if (current) { current.url = line; items.push(current); current = null; }
                }
            });
            return items;
        }

        function showPackages() {
            isInsidePackage = false;
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('title').innerText = "Siksa TV - الباقات";
            renderCards(window.allPackages, true);
        }

        async function loadSubMenu(url, title) {
            contentContainer.innerHTML = '';
            spinner.style.display = 'block';
            try {
                const res = await fetch(url);
                const data = await res.text();
                const channels = parseM3U(data);
                isInsidePackage = true;
                document.getElementById('btn-back').style.display = 'block';
                document.getElementById('title').innerText = title;
                renderCards(channels, false);
            } catch (e) { alert("فشل التحميل"); }
            spinner.style.display = 'none';
        }

        function renderCards(items, isPackage) {
            contentContainer.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.tabIndex = 0;
                div.innerHTML = `<img src="${item.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"><span>${item.name}</span>`;
                div.onclick = () => isPackage ? loadSubMenu(item.url, item.name) : playStream(item.url);
                contentContainer.appendChild(div);
                if(index === 0) div.focus();
            });
        }

        function playStream(url) {
            document.getElementById('player-wrapper').style.display = 'block';
            if (jwInst) jwInst.remove();
            jwInst = jwplayer("jwplayerDiv").setup({
                file: url,
                width: "100%", height: "100%", autostart: true,
                stretching: "exactfit",
                type: (url.includes(".mpd")) ? "dash" : (url.includes(".m3u8") ? "hls" : "mp4"),
            });
            jwInst.on('buffer', () => spinner.style.display = 'block');
            jwInst.on('play', () => spinner.style.display = 'none');
        }

        function closePlayer() {
            if (jwInst) { jwInst.remove(); jwInst = null; }
            document.getElementById('player-wrapper').style.display = 'none';
        }

        // --- نظام الريموت (الأسهم والرجوع فقط) ---
        window.addEventListener('keydown', function(e) {
            const cards = Array.from(document.querySelectorAll('.card'));
            const index = cards.indexOf(document.activeElement);
            const cols = Math.floor(contentContainer.offsetWidth / 180);

            switch(e.key) {
                case "ArrowRight": if(cards[index+1]) cards[index+1].focus(); break;
                case "ArrowLeft":  if(cards[index-1]) cards[index-1].focus(); break;
                case "ArrowDown":  if(cards[index+cols]) cards[index+cols].focus(); break;
                case "ArrowUp":    if(cards[index-cols]) cards[index-cols].focus(); break;
                case "Enter":      document.activeElement.click(); break;
                case "BackSpace":
                case "Escape":
                    e.preventDefault();
                    if (document.getElementById('player-wrapper').style.display === 'block') {
                        closePlayer();
                    } else if (isInsidePackage) {
                        showPackages();
                    }
                    break;
            }
        });

        start();
    </script>
</body>
</html>
