<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siksa TV Pro - TV UI</title>
    
    <meta name="referrer" content="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
    <link rel="stylesheet" href="https://akomov.com/todapi/jw_ako.css">

    <style>
        :root { --primary: #00d2ff; --bg: #050505; --sidebar-width: 250px; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; height: 100vh; }
        
        /* القائمة الجانبية */
        #sidebar { width: var(--sidebar-width); background: #111; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-left: 2px solid #222; }
        .side-item { padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .side-item:focus { background: var(--primary); color: black; outline: none; }
        
        /* منطقة القنوات */
        #main-content { flex: 1; padding: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; overflow-y: auto; }
        
        .card { background: #1a1a1a; border: 3px solid transparent; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:focus { border-color: var(--primary); transform: scale(1.05); background: #222; outline: none; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px; }
        .card span { display: block; margin-top: 10px; font-size: 14px; }

        /* المشغل */
        #player-wrapper { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #jwplayerDiv { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-bottom: 20px;">القائمة</h2>
        <div id="menu-items"></div>
    </div>

    <div id="main-content"></div>

    <div id="player-wrapper">
        <div id="jwplayerDiv"></div>
    </div>

    <script>
        const MASTER_URL = 'https://raw.githubusercontent.com/raid35/channel-links/main/siksa_tv.m3u';
        let allPackages = [];
        let jwInst = null;

        async function init() {
            const res = await fetch(MASTER_URL);
            const data = await res.text();
            allPackages = parseM3U(data);
            renderSidebar();
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const items = [];
            let current = null;
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    const name = line.split(',').pop();
                    const logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || '';
                    current = { name, logo };
                } else if (line.startsWith('http')) {
                    if (current) { current.url = line; items.push(current); current = null; }
                }
            });
            return items;
        }

        function renderSidebar() {
            const menu = document.getElementById('menu-items');
            allPackages.forEach((pkg, index) => {
                const div = document.createElement('div');
                div.className = 'side-item';
                div.tabIndex = 0;
                div.innerText = pkg.name;
                div.onclick = () => loadCategory(pkg.url);
                menu.appendChild(div);
                if(index === 0) div.focus();
            });
        }

        async function loadCategory(url) {
            const container = document.getElementById('main-content');
            container.innerHTML = "جاري التحميل...";
            const res = await fetch(url);
            const data = await res.text();
            const channels = parseM3U(data);
            
            container.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.tabIndex = 0;
                div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"><span>${ch.name}</span>`;
                div.onclick = () => playStream(ch.url);
                container.appendChild(div);
            });
        }

        function playStream(url) {
            document.getElementById('player-wrapper').style.display = 'block';
            if (jwInst) jwInst.remove();
            jwInst = jwplayer("jwplayerDiv").setup({
                file: url, width: "100%", height: "100%", autostart: true, stretching: "exactfit",
                type: (url.includes(".m3u8") ? "hls" : "mp4"),
            });
        }

        // تحسين التنقل للريموت
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 8 || e.keyCode === 10009) { // زر الرجوع
                if (document.getElementById('player-wrapper').style.display === 'block') {
                    if(jwInst) { jwInst.remove(); jwInst = null; }
                    document.getElementById('player-wrapper').style.display = 'none';
                    e.preventDefault();
                }
            }
        });

        init();
    </script>
</body>
</html>
