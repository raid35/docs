<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siksa TV - Multi Level</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            background: #0f0c29;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:focus, .card:hover {
            transform: scale(1.05);
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 5px;
        }

        .card span {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            height: 34px;
            overflow: hidden;
        }

        #player-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999;
        }

        .back-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        .close-player {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10000;
            background: rgba(255,0,0,0.7);
            color: white; border: none; padding: 10px;
            border-radius: 50%; width: 40px; height: 40px;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <button id="btn-back" class="back-btn" onclick="showPackages()">⬅ رجوع للباقات</button>
        <h2 id="title">الباقات الرئيسية</h2>
        <div style="width: 80px;"></div>
    </div>

    <div class="container" id="main-content">
        </div>

    <div id="player-container">
        <button class="close-player" onclick="closePlayer()">X</button>
        <video id="video-player" class="video-js vjs-big-play-centered vjs-fill" controls></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // رابط ملف الباقات الرئيسي الخاص بك
        const MASTER_M3U = 'https://raw.githubusercontent.com/raid35/channel-links/main/siksa_tv.m3u'; 
        
        let allPackages = [];
        const contentDiv = document.getElementById('main-content');
        const backBtn = document.getElementById('btn-back');
        const titleText = document.getElementById('title');
        let player = videojs('video-player');

        // 1. جلب الباقات عند التشغيل
        async function init() {
            contentDiv.innerHTML = "جاري تحميل الباقات...";
            try {
                const response = await fetch(MASTER_M3U);
                const text = await response.text();
                allPackages = parseM3U(text);
                showPackages();
            } catch (e) {
                contentDiv.innerHTML = "خطأ في التحميل، تأكد من الرابط أو إعدادات CORS";
            }
        }

        // دالة تحليل ملفات M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            const items = [];
            let currentItem = {};

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    const nameMatch = line.split(',').pop();
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentItem = {
                        name: nameMatch || "بدون اسم",
                        logo: logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150'
                    };
                } else if (line.startsWith('http')) {
                    currentItem.url = line;
                    items.push(currentItem);
                    currentItem = {};
                }
            });
            return items;
        }

        // عرض الباقات
        function showPackages() {
            titleText.innerText = "الباقات الرئيسية";
            backBtn.style.display = 'none';
            contentDiv.innerHTML = '';
            
            allPackages.forEach(pkg => {
                const card = createCard(pkg, () => loadChannels(pkg.url, pkg.name));
                contentDiv.appendChild(card);
            });
        }

        // جلب القنوات داخل الباقة
        async function loadChannels(url, name) {
            contentDiv.innerHTML = "جاري فتح الباقة...";
            titleText.innerText = "باقة: " + name;
            backBtn.style.display = 'block';

            try {
                const response = await fetch(url);
                const text = await response.text();
                const channels = parseM3U(text);
                
                contentDiv.innerHTML = '';
                channels.forEach(ch => {
                    const card = createCard(ch, () => playVideo(ch.url));
                    contentDiv.appendChild(card);
                });
            } catch (e) {
                contentDiv.innerHTML = "فشل تحميل قنوات هذه الباقة.";
            }
        }

        function createCard(item, action) {
            const div = document.createElement('div');
            div.className = 'card';
            div.tabIndex = 0;
            div.innerHTML = `
                <img src="${item.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'">
                <span>${item.name}</span>
            `;
            div.onclick = action;
            div.onkeydown = (e) => { if(e.key === 'Enter') action(); };
            return div;
        }

        function playVideo(url) {
            document.getElementById('player-container').style.display = 'block';
            player.src({ type: 'application/x-mpegURL', src: url });
            player.play();
        }

        function closePlayer() {
            player.pause();
            document.getElementById('player-container').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
