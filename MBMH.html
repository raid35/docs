    <title>بين اسبورت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Readex+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #26ab56;
            --dark-bg: #1a1a1a;
            --dark-card: #2d2d2d;
            --light-bg: #f5f5f5;
            --light-card: #ffffff;
            --text-dark: #ffffff;
            --text-light: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Readex Pro', 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-dark);
            transition: var(--transition);
            min-height: 100vh;
        }

        body.light-mode {
            background-color: var(--light-bg);
            color: var(--text-light);
        }

        /* تعديل محتوى الصفحة لتبدأ من الأعلى */
        #page {
            padding: 15px; /* مسافة بسيطة من الحواف */
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        @media (max-width: 768px) {
            #page { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }

        @media (max-width: 480px) {
            #page { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        }

        .channel-card {
            background-color: var(--dark-card);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px 5px;
            border: 2px solid transparent;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        body.light-mode .channel-card { background-color: var(--light-card); }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .channel-card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 10%;
            background: white;
            padding: 2px;
        }

        .channel-card p {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
        }

        /* الرسوم المتحركة */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .channel-card { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
